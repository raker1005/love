name: Love Alarm APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js www/ 2>/dev/null || true
          cp -r css www/ 2>/dev/null || true
          cp -r js www/ 2>/dev/null || true
          cp -r icons www/ 2>/dev/null || true
          echo "✅ www folder contents:"
          ls -la www/

      - name: Write capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.example.lovealarm",
            "appName": "Love Alarm",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#000000"
            }
          }
          EOF

      - name: Add Android platform
        run: npx cap add android || echo "Android already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: love-alarm-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build success message
        run: echo "🎉 APK 빌드 성공! Artifacts에서 다운로드하세요."
